<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center py-section-gap px-gutter w-full max-w-max-width mx-auto z-10">
    <!-- Header -->
    <header class="text-center mb-12">
        <h1 class="font-headline-lg text-headline-lg text-primary mb-stack-sm">Qanday kitoblar yoqadi sizga?</h1>
        <p class="font-body-md text-body-md text-text-secondary">Kamida 3 tasini tanlang</p>
    </header>
    <!-- Genre Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-stack-md w-full" id="genre-grid">
        <!-- Fantastika (Pre-selected) -->
        <button class="genre-card group flex flex-col items-center justify-center p-6 h-36 rounded-[20px] transition-all duration-300 ease-in-out border-2 border-secondary bg-surface-container-low shadow-[0px_4px_20px_rgba(27,77,62,0.05)] scale-[1.02]" data-selected="true">
            <span class="material-symbols-outlined text-4xl mb-3 text-secondary transition-colors" data-icon="rocket_launch">rocket_launch</span>
            <span class="font-headline-sm text-headline-sm text-primary transition-colors">Fantastika</span>
        </button>
        <!-- Tarix -->
        <button class="genre-card group flex flex-col items-center justify-center p-6 h-36 rounded-[20px] transition-all duration-300 ease-in-out border border-border-warm bg-surface-paper hover:border-primary/30 hover:shadow-[0px_4px_20px_rgba(27,77,62,0.05)]" data-selected="false">
            <span class="material-symbols-outlined text-4xl mb-3 text-primary/60 group-hover:text-primary transition-colors" data-icon="history_edu">history_edu</span>

        </button>
        <!-- Roman (Pre-selected) -->
        <button class="genre-card group flex flex-col items-center justify-center p-6 h-36 rounded-[20px] transition-all duration-300 ease-in-out border-2 border-secondary bg-surface-container-low shadow-[0px_4px_20px_rgba(27,77,62,0.05)] scale-[1.02]" data-selected="true">
            <span class="material-symbols-outlined text-4xl mb-3 text-secondary transition-colors" data-icon="favorite">favorite</span>

        </button>
        <!-- Psixologiya -->

            <span class="material-symbols-outlined text-4xl mb-3 text-primary/60 group-hover:text-primary transition-colors" data-icon="psychology">psychology</span>
            <span class="font-headline-sm text-headline-sm text-primary/80 group-hover:text-primary transition-colors">Psixologiya</span>
        </button>
        <!-- Ilmiy -->

            <span class="material-symbols-outlined text-4xl mb-3 text-primary/60 group-hover:text-primary transition-colors" data-icon="science">science</span>

        <!-- Detektiv -->

        </button>
        <!-- Biografiya -->

<!-- Simple interaction script for demo purposes -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const cards = document.querySelectorAll('.genre-card');

        cards.forEach(card => {
            card.addEventListener('click', () => {
                const isSelected = card.getAttribute('data-selected') === 'true';
                const icon = card.querySelector('.material-symbols-outlined');
                const text = card.querySelector('span:not(.material-symbols-outlined)');

                if (isSelected) {
                    // Deselect
                    card.setAttribute('data-selected', 'false');
                    card.className = 'genre-card group flex flex-col items-center justify-center p-6 h-36 rounded-[20px] transition-all duration-300 ease-in-out border border-border-warm bg-surface-paper hover:border-primary/30 hover:shadow-[0px_4px_20px_rgba(27,77,62,0.05)]';
                    icon.className = 'material-symbols-outlined text-4xl mb-3 text-primary/60 group-hover:text-primary transition-colors';
                    text.className = 'font-headline-sm text-headline-sm text-primary/80 group-hover:text-primary transition-colors';
                } else {
                    // Select
                    card.setAttribute('data-selected', 'true');
                    card.className = 'genre-card group flex flex-col items-center justify-center p-6 h-36 rounded-[20px] transition-all duration-300 ease-in-out border-2 border-secondary bg-surface-container-low shadow-[0px_4px_20px_rgba(27,77,62,0.05)] scale-[1.02]';
                    icon.className = 'material-symbols-outlined text-4xl mb-3 text-secondary transition-colors';
                    text.className = 'font-headline-sm text-headline-sm text-primary transition-colors';
                }
            });
        });
    });
</script>
